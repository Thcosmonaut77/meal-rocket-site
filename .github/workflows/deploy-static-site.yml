name: Deploy MealRocket Static Site

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    name: Build & Deploy Static Site
    runs-on: ubuntu-latest

    env:
      TF_DIR: infrastructure
      SITE_DIR: site
      BUILD_DIR: build
      WHATSAPP_NUMBER: "+2348100001234"   # Change if needed

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # -----------------------------
      # AWS Credentials
      # -----------------------------
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      # -----------------------------
      # Install Terraform
      # -----------------------------
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        working-directory: ${{ env.TF_DIR }}
        run: terraform init

      - name: Terraform Output
        id: tf-out
        working-directory: ${{ env.TF_DIR }}
        run: |
          echo "API_ENDPOINT=$(terraform output -raw api_endpoint)" >> $GITHUB_ENV
          echo "SITE_BUCKET=$(terraform output -raw site_bucket_name)" >> $GITHUB_ENV
          echo "CF_DIST_ID=$(terraform output -raw cloudfront_distribution_id)" >> $GITHUB_ENV

      # -----------------------------
      # Build Static Site
      # -----------------------------
      - name: Prepare build directory
        run: |
          rm -rf $BUILD_DIR
          mkdir -p $BUILD_DIR
          cp -r $SITE_DIR/* $BUILD_DIR/

      - name: Inject API endpoint & WhatsApp number
        run: |
          JS_FILE="$BUILD_DIR/tooplate-bistro-scripts.js"

          if [ -f "$JS_FILE" ]; then
            sed -i "s|__API_ENDPOINT__|${API_ENDPOINT}|g" "$JS_FILE"
            sed -i "s|__WHATSAPP__|${WHATSAPP_NUMBER}|g" "$JS_FILE"
          else
            echo "JavaScript file not found for injection"
            exit 1
          fi

      # -----------------------------
      # Deploy to S3
      # -----------------------------
      - name: Sync to S3
        run: |
          aws s3 sync $BUILD_DIR s3://$SITE_BUCKET \
            --delete \
            --acl bucket-owner-full-control

      # -----------------------------
      # CloudFront Invalidation
      # -----------------------------
      - name: Create CloudFront invalidation
        if: env.CF_DIST_ID != ''
        run: |
          aws cloudfront create-invalidation \
            --distribution-id $CF_DIST_ID \
            --paths "/*"

      - name: Deployment Complete
        run: echo "Deployment finished successfully!"
